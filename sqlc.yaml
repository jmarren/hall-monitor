version: "2"
sql:
  - engine: "postgresql"
    queries: "./sql"
    schema: "./sql/schema.sql"
    gen:
      go:
        package: "db"
        emit_result_struct_pointers: true
        sql_package: "pgx/v5"
        out: "."
        overrides:
           - db_type: "Refund"
             go_type:
                pointer: true       
